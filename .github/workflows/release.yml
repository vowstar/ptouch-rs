name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_cli: ptouch
            artifact_gui: ptouch-gui
            asset_suffix: linux-amd64
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            artifact_cli: ptouch.exe
            artifact_gui: ptouch-gui.exe
            asset_suffix: windows-amd64
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            artifact_cli: ptouch
            artifact_gui: ptouch-gui
            asset_suffix: macos-arm64
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev libudev-dev

      - name: Build
        run: cargo build --release --workspace --verbose --target ${{ matrix.target }}

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ptouch-${{ matrix.asset_suffix }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_cli }}
          if-no-files-found: error

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ptouch-gui-${{ matrix.asset_suffix }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_gui }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/ptouch-linux-amd64/ptouch release/ptouch-linux-amd64
          cp artifacts/ptouch-gui-linux-amd64/ptouch-gui release/ptouch-gui-linux-amd64
          cp artifacts/ptouch-windows-amd64/ptouch.exe release/ptouch-windows-amd64.exe
          cp artifacts/ptouch-gui-windows-amd64/ptouch-gui.exe release/ptouch-gui-windows-amd64.exe
          cp artifacts/ptouch-macos-arm64/ptouch release/ptouch-macos-arm64
          cp artifacts/ptouch-gui-macos-arm64/ptouch-gui release/ptouch-gui-macos-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
